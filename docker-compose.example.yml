services:
  metube:
    image: ghcr.io/alexta69/metube:latest
    container_name: metube
    restart: unless-stopped
    ports:
      - "0.0.0.0:8081:8081"
    volumes:
      - /mnt/2TB/优兔视频:/downloads
      - /www/metube/state:/state
      - /www/metube/custom/index.html:/app/ui/dist/metube/browser/index.html:ro
      - /www/metube/custom/metube-zh-cn.js:/app/ui/dist/metube/browser/metube-zh-cn.js:ro
      - /www/metube/custom/dl_formats.py:/app/app/dl_formats.py:ro
      - /www/metube/custom/ytdl.py:/app/app/ytdl.py:ro
      - /www/metube/custom/subscriptions.py:/app/app/subscriptions.py:ro
    environment:
      - DOWNLOAD_DIR=/downloads
      - STATE_DIR=/state
      - TEMP_DIR=/downloads/.下载临时文件
      - SUBSCRIPTION_DEFAULT_CHECK_INTERVAL=5
      - SUBSCRIPTION_SCAN_PLAYLIST_END=50
      - DEFAULT_OPTION_PLAYLIST_ITEM_LIMIT=1
      - MAX_CONCURRENT_DOWNLOADS=3
      - DELETE_FILE_ON_TRASHCAN=true
      - DEFAULT_THEME=auto
      - YTDL_OPTIONS={"remote_components":["ejs:github"]}
      - TITLE_TRANSLATE_ENABLED=true
      - TITLE_TRANSLATE_TARGET_LANG=zh-CN
      - TITLE_TRANSLATE_API_BASE=${TITLE_TRANSLATE_API_BASE:-}
      - TITLE_TRANSLATE_API_KEY=${TITLE_TRANSLATE_API_KEY:-}
      - TITLE_TRANSLATE_MODEL=${TITLE_TRANSLATE_MODEL:-gpt-5.5}
